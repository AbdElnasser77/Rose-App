<form [formGroup]="confirmEmailVerificationForm" (ngSubmit)="onConfirmEmailVerificationSubmit()"
    class="w-full max-w-[406px] mx-auto flex flex-col gap-[24px]">
    <lib-welcome-message title="Become part of our family!" class="font-edwardian">
    </lib-welcome-message>

    <lib-divider></lib-divider>
    <p class="font-sarabun font-normal text-[16px] leading-none align-middle text-[#27272A]">
        We have sent a 6-digit code to {{email}}
        <span
            class="font-sarabun font-medium text-[16px] text-[#1447E6] leading-none align-middle underline cursor-pointer">
            Edit
        </span>
    </p>
    <div class="flex justify-center">
        <lib-otp-input [disabled]="confirmEmailVerificationForm.invalid || loading()" [length]="6" formControlName="otp"
            class="mx-auto">
        </lib-otp-input>
    </div>


    <div class="flex justify-end w-full ">
        <lib-button type="button" variant="Ghost" size="auto" (click)="onResendCode()" [loading]="resendLoading"
            [disabled]="resendLoading">Send a new
            code</lib-button>
    </div>


    <div class="text-sm text-zinc-500 text-center">
        Resend available in
        <countdown class="text-[#A6252A] font-bold" [config]="countdownConfig" (event)="handleCountdownEvent($event)">
        </countdown>
    </div>

    <lib-button type="submit" [disabled]="confirmEmailVerificationForm.invalid || confirmLoading "
        [loading]="confirmLoading" size="full" variant="Primary">Verify OTP</lib-button>

    <lib-divider></lib-divider>


    <lib-callout-text text="Already have an account?" linkText="Login" linkUrl="/auth/login"></lib-callout-text>
</form>
