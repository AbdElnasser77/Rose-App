<div class="fixed bottom-[20px] right-[20px] z-50 flex flex-col gap-3">
    @for (toast of toasts(); track toast.id) {

    <lib-toast [message]="toast.message" [variant]="toast.type === 'success'
        ? 'Success'
        : toast.type === 'error'
        ? 'Error'
        : 'Default'" (closed)="dismissToast(toast.id)">
    </lib-toast>

    }

</div>
