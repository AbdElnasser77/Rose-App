<div class="flex flex-col mx-5">

    <div class="special-header">
        <h1 class="text-5xl text-center font-pinyon text-maroon-700 dark:text-soft-pink-300">Welcome back!</h1>
        <lib-divider></lib-divider>

        <form [formGroup]="loginForm" class="flex flex-col gap-4">
            <lib-reusable-input formControlName="username" type="text" label="Username"
                placeholder="Enter your username" />

            <lib-reusable-input formControlName="password" type="password" label="Password"
                placeholder="Enter your password" />

            <div class="w-auto ms-auto">
                <a routerLink="/auth/forgot-password"
                    class="text-sm text-maroon-600 hover:underline text-end cursor-pointer font-bold dark:text-soft-pink-300">
                    Forgot your password?
                </a>
            </div>

            <label class="flex items-center gap-2 cursor-pointer w-fit">
                <div class="relative">
                    <input type="checkbox" formControlName="rememberMe" class="peer sr-only" />
                    <div
                        class="w-5 h-5 rounded-md border-2 border-maroon-700 dark:border-soft-pink-300 peer-checked:bg-maroon-700 dark:peer-checked:bg-pink-300 transition-colors">
                    </div>
                    <div
                        class="absolute inset-0 flex items-center justify-center opacity-0 peer-checked:opacity-100 transition-opacity">
                        <lucide-icon [img]="Check" class="w-4 h-4 text-white" />
                    </div>
                </div>
                <span class="text-sm text-zinc-800 dark:text-zinc-50 ">Remember me</span>
            </label>

            <lib-divider></lib-divider>


            <lib-button [type]="'submit'" [size]="'full'" [loading]="authStore.loading()" [disabled]="authStore.loading()" class="text-white cursor-pointer" (clicked)="onSubmit()">Login</lib-button>

            <p class="text-sm text-center text-zinc-600 dark:text-zinc-400">
                Don't have an account yet?
                <a routerLink="/auth/register"
                    class="font-bold text-maroon-600 dark:text-soft-pink-300 hover:underline cursor-pointer">
                    Create one now.
                </a>
            </p>

        </form>


    </div>
</div>
