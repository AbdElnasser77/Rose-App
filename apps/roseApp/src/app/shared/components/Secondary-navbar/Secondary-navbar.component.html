<div class="relative">

  <!-- Top Navbar -->
  <div
    class="bg-white px-3 md:px-6 py-3 flex items-center justify-between gap-3 border-b"
  >

    <!-- Left -->
    <div class="flex items-center gap-2 md:gap-4 shrink-0">

      <img
        src="http://localhost:4203/assets/logo.png"
        alt="logo"
        class="w-10 h-10 md:w-14 md:h-14 object-contain"
      />

      <div class="text-xs md:text-sm">
        <p class="text-gray-400">Deliver to:</p>

        <div class="flex items-center gap-1 text-[#8B1E24]">
          <i class="fa-solid fa-location-dot"></i>
          <span>Cairo</span>
        </div>
      </div>

    </div>

    <!-- Search -->
    <div class="flex-1 min-w-0 mx-2 md:mx-8">

      <input
        type="text"
        placeholder="Search gifts..."
        class="w-full border rounded-md px-2 md:px-4 py-2 outline-none text-xs md:text-base"
      />

    </div>

    <!-- Right -->
    <div class="flex items-center gap-2 md:gap-5 shrink-0">

      <!-- User -->
      <div class="relative">

        <button
          (click)="toggleDropdown()"
          class="flex items-center gap-2 cursor-pointer"
        >

          <div class="text-left">

            <p class="hidden md:block text-xs text-gray-400">
              Hello
            </p>

            <p class="text-sm text-[#8B1E24] font-medium">
              Jonathan
            </p>

          </div>

          <i class="fa-solid fa-chevron-down text-xs"></i>

        </button>

        @if (isDropdownOpen) {

        <div
          class="absolute right-0 top-12 bg-white rounded-lg shadow-lg w-56 z-50 overflow-hidden"
        >

          <div class="p-4 font-semibold text-[#8B1E24] border-b">
            Jonathan Adrian
          </div>

          <button class="w-full text-left px-4 py-3 hover:bg-gray-100">
            Account
          </button>

          <button class="w-full text-left px-4 py-3 hover:bg-gray-100">
            Addresses
          </button>

          <button class="w-full text-left px-4 py-3 hover:bg-gray-100">
            Orders
          </button>

          <button class="w-full text-left px-4 py-3 hover:bg-gray-100">
            Dashboard
          </button>

          <button
            (click)="logout()"
            class="w-full text-left px-4 py-3 hover:bg-gray-100 text-red-600"
          >
            Log out
          </button>

        </div>

        }

      </div>

      <!-- Wishlist -->
      <button class="hidden md:block">
        <i class="fa-regular fa-heart text-lg"></i>
      </button>

      <!-- Cart -->
      <div class="relative">

        <i class="fa-solid fa-cart-shopping text-lg"></i>

        <span
          class="absolute -top-2 -right-2 bg-red-600 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center"
        >
          2
        </span>

      </div>

      <!-- Notification -->
      <div class="relative hidden md:block">

        <i class="fa-regular fa-bell text-lg"></i>

        <span
          class="absolute -top-2 -right-2 bg-red-600 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center"
        >
          2
        </span>

      </div>

      <span class="hidden sm:block">
        العربية
      </span>

    </div>

  </div>

  <!-- Desktop Menu -->
  <div
    class="hidden md:flex bg-[#8B1E24] text-white h-10 items-center justify-center"
  >
    <div class="flex items-center gap-8 text-sm">

      <a href="#">Home</a>
      <a href="#">Products</a>
      <a href="#">Categories</a>
      <a href="#">Occasions</a>
      <a href="#">Contact</a>
      <a href="#">About</a>

    </div>
  </div>

  <!-- Mobile Menu -->
  <div
    class="md:hidden bg-[#8B1E24] h-[40px] px-4 flex items-center justify-between"
  >

    <span class="text-white text-sm font-medium">
      Menu
    </span>

    <button
      (click)="toggleMobileMenu()"
      class="text-white flex items-center"
    >
      <i
        class="fa-solid"
        [class.fa-bars]="!isMobileMenuOpen"
        [class.fa-xmark]="isMobileMenuOpen"
      ></i>
    </button>

  </div>

  <!-- Mobile Dropdown -->
  <div
    *ngIf="isMobileMenuOpen"
    class="md:hidden bg-white border-t border-gray-200 shadow-sm"
  >

    <div class="flex flex-col text-sm">

      <a class="px-4 py-3 border-b border-gray-100 cursor-pointer">
        Home
      </a>

      <a class="px-4 py-3 border-b border-gray-100 cursor-pointer">
        Products
      </a>

      <a class="px-4 py-3 border-b border-gray-100 cursor-pointer">
        Categories
      </a>

      <a class="px-4 py-3 border-b border-gray-100 cursor-pointer">
        Occasions
      </a>

      <a class="px-4 py-3 border-b border-gray-100 cursor-pointer">
        Contact
      </a>

      <a class="px-4 py-3 border-b border-gray-100 cursor-pointer">
        About
      </a>

      <a class="px-4 py-3 border-b border-gray-100 cursor-pointer">
        Account
      </a>

      <a class="px-4 py-3 border-b border-gray-100 cursor-pointer">
        Orders
      </a>

      <a class="px-4 py-3 text-red-600 cursor-pointer">
        Logout
      </a>

    </div>

  </div>

</div>
