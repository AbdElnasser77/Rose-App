<section class="w-full px-4 sm:px-6 lg:px-[81px] mt-20">
  <app-section-title
    [mainTitle]="'GALLERY.SUBTITLE' | translate"
    [subTitle]="'GALLERY.TITLE' | translate"
    alignment="center"
  ></app-section-title>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
    @for (column of columns(); track $index; let colIndex = $index) {
      <div class="flex flex-col gap-4">
        @for (image of column; track image.src; let imgIndex = $index) {
          <button
            type="button"
            (click)="openLightbox(colIndex * column.length + imgIndex)"
            [class]="
              'group relative block w-full overflow-hidden cursor-pointer ' +
              image.aspect
            "
          >
            <img
              [src]="image.src | assetUrl"
              alt=""
              class="w-full h-full object-cover transition-transform duration-500 ease-out group-hover:scale-105"
            />
            <span
              class="pointer-events-none absolute inset-0 flex items-center justify-center bg-black/0 transition-colors duration-300 group-hover:bg-black/30"
            >
              <span
                class="rounded-full bg-white/90 p-3 text-gray-900 opacity-0 shadow-lg transition-opacity duration-300 ease-out group-hover:opacity-100 dark:bg-gray-900/90 dark:text-white"
              >
                <lucide-icon [img]="ZoomInIcon" [size]="22"></lucide-icon>
              </span>
            </span>
          </button>
        }
      </div>
    }
  </div>
</section>

@if (lightboxIndex() !== null) {
  <div
    class="fixed inset-0 z-[1000] flex items-center justify-center bg-black/90 backdrop-blur-sm p-4"
  >
    <!-- Click outside to close -->
    <button
      type="button"
      aria-label="Close gallery"
      class="absolute inset-0 h-full w-full cursor-default"
      (click)="closeLightbox()"
    ></button>

    <button
      type="button"
      aria-label="Close gallery"
      class="absolute top-4 right-4 z-20 cursor-pointer rounded-full bg-white/10 p-2 text-white transition-colors duration-200 hover:bg-white/20"
      (click)="closeLightbox()"
    >
      <lucide-icon [img]="XIcon" [size]="26"></lucide-icon>
    </button>

    <button
      type="button"
      aria-label="Previous image"
      class="absolute left-2 sm:left-6 z-20 cursor-pointer rounded-full bg-white/10 p-2 text-white transition-colors duration-200 hover:bg-white/20"
      (click)="prev()"
    >
      <lucide-icon [img]="ChevronLeftIcon" [size]="30"></lucide-icon>
    </button>

    <button
      type="button"
      [attr.aria-label]="isZoomed() ? 'Zoom out' : 'Zoom in'"
      class="group relative z-10 cursor-pointer"
      (click)="toggleZoom()"
    >
      <img
        [src]="images()[lightboxIndex()!].src | assetUrl"
        alt=""
        [class]="
          'max-h-[85vh] max-w-[calc(100vw_-_7rem)] object-contain shadow-2xl ring-0 ring-white/60 transition-all duration-300 group-hover:ring-4 ' +
          (isZoomed() ? 'scale-150 cursor-zoom-out' : '')
        "
      />
    </button>

    <button
      type="button"
      aria-label="Next image"
      class="absolute right-2 sm:right-6 z-20 cursor-pointer rounded-full bg-white/10 p-2 text-white transition-colors duration-200 hover:bg-white/20"
      (click)="next()"
    >
      <lucide-icon [img]="ChevronRightIcon" [size]="30"></lucide-icon>
    </button>

    <span
      class="absolute bottom-5 left-1/2 z-20 -translate-x-1/2 rounded-full bg-white/10 px-4 py-1 text-sm text-white"
    >
      {{ lightboxIndex()! + 1 }} / {{ images().length }}
    </span>
  </div>
}
