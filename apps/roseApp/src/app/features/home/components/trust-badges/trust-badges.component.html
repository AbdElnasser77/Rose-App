<section class="w-full max-w-[1280px] mx-auto px-[24px] md:px-0 py-[40px] md:py-0
 bg-[#FBEAEA] rounded-[20px] text-center shadow-sm">

 <h3 class="font-sarabun text-[36px] font-bold leading-[100%] tracking-[0] text-center text-[#A6252A]">
    Trusted by over <span class="text-[#FF668B]">4.5k+</span>companies</h3>

    <div class="flex flex-wrap items-center justify-center gap-[71px]">
        @for(partner of partners ;track partner.name){
            <div class="flex items-center justify-center h-[51px] w-[146px]">
                <img 
            [src]="partner.src" 
            [alt]="partner.alt" 
            class="max-h-full max-w-full object-contain"
          />
            </div>

        }

    </div>

</section>
