<div
  class="w-full min-h-[53px] p-3 sm:p-4  border relative  rounded-[10px] flex items-center gap-[10px] shadow-[0px_15px_30px_-3px_rgba(0,0,0,0.1)] transition-all"
  [ngClass]="{
    'bg-zinc-100  border-[#A1A1AA] text-zinc-800': variant === 'Default',

    'bg-emerald-50 border-[#007A55] text-green-800': variant === 'Success',

    'bg-red-50  border-[#B91C1C] text-red-800': variant === 'Error'
  }">
  <lucide-icon [img]="getIcon()" class="h-[18px] w-[18px] shrink-0" [ngClass]="{
    'text-zinc-600': variant === 'Default',
    'text-emerald-700': variant === 'Success',
    'text-red-700': variant === 'Error'
 }"></lucide-icon>
  <span class="text-[14px] font-medium font-mulish leading-none">
    {{ message }}
  </span>



  <div (click)="onClose()" class="w-[35px] h-[35px] p-[10px] text-[#A1A1AA] cursor-pointer
   flex items-start sm:items-center justify-center absolute top-0 right-0 z-5 hover:bg-black/5 rounded-full transition-all">
    
    <lucide-icon class="w-[15px] h-[15px] opacity-70 hover:opacity-100 transition-opacity duration-200"
      [img]="X"></lucide-icon>

  </div>
</div>
