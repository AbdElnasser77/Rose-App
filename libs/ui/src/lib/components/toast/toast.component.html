<div 
  class="w-full max-w-[447px] h-[53px] px-8 py-4 pl-4 rounded-[10px] flex items-center gap-[10px] shadow-[0px_15px_30px_-3px_rgba(0,0,0,0.1)] transition-all"
  [ngClass]="{
    'bg-zinc-100 border border-zinc-400 text-zinc-800': variant === 'Default',

    'bg-emerald-50 border border-emerald-700 text-green-800': variant === 'Success',

    'bg-red-50 border border-red-700 text-red-800': variant === 'Error'
  }"
>
  <span class="text-[14px] font-medium font-mulish leading-none">
    {{ message }}
  </span>
</div>
