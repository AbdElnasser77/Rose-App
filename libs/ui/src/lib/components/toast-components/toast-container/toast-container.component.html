<div class="fixed bottom-4 right-4 sm:bottom-[20px] sm:right-[20px]  w-[90vw] sm:w-[447px]
  max-w-[447px] z-50 flex flex-col gap-3  items-end">
    @for (toast of toasts(); track toast.id) {

    <lib-toast [message]="toast.message" [variant]="toast.type === 'success'
        ? 'Success'
        : toast.type === 'error'
        ? 'Error'
        : 'Default'" (closed)="dismissToast(toast.id)">
    </lib-toast>

    }

</div>
