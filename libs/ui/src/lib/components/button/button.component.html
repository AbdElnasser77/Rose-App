<button [type]="type" [disabled]="disabled" (click)="onButtonClick($event)" class="
     h-[41px] px-4 py-[14px] rounded-[10px] font-sarabun font-medium text-[16px] leading-none 
    flex items-center justify-center gap-[10px]
    disabled:cursor-not-allowed
    transition
  "
  [ngClass]="{
    'w-full': size === 'full',
    'w-1/2': size === 'half',
    'w-auto min-w-[120px]': size === 'auto',

    'bg-maroon-600 text-[#FFFFFF] hover:bg-maroon-700':variant === 'Primary' && !disabled && !loading,

    'bg-maroon-50 text-maroon-600 hover:bg-maroon-100' : variant === 'Secondary' && !disabled && !loading,

    'bg-[#FFFFFF] border border-[#A6252A] text-maroon-600 hover:bg-maroon-50 ' : variant === 'Outline' && !disabled && !loading,
    'bg-zinc-100 text-zinc-400 border border-zinc-300 ': variant === 'Outline' && (disabled || loading),

    'bg-zinc-50 border border-[#A1A1AA] text-[#27272A] hover:bg-zinc-400' : variant === 'Subtle' && !disabled && !loading,
    'bg-zinc-100 text-zinc-400 border border-zinc-300': variant === 'Subtle' && (disabled || loading),

    'bg-transparent text-zinc-800 hover:bg-zinc-100' : variant === 'Ghost' && !disabled && !loading,
    'bg-zinc-100 text-zinc-400': variant === 'Ghost' && (disabled || loading),

    'bg-red-600 text-[#FFFFFF] hover:bg-red-700 ' : variant === 'Destructive' && !disabled && !loading,


    'bg-zinc-300 text-zinc-500': (disabled || loading) && (variant === 'Primary' || variant === 'Secondary' || variant === 'Destructive')
    
  }"
  >
 
  <ng-content></ng-content>
   @if (loading) {
    <lucide-icon [img]="LoaderCircle" class="animate-spin h-5 w-5"></lucide-icon>
  }
</button>
