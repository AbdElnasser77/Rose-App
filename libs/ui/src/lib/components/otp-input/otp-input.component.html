<div class="flex justify-center card">
  <p-inputotp 
    [ngModel]="value()" 
    (ngModelChange)="onValueChange($event)"
    (blur)="onBlur()"
    [length]="length()"
    [integerOnly]="true"
    type="tel" 
    [ngClass]="{
    'otp-error': otpServerError() ||
    (control?.invalid && control?.touched)
  }"
  
  />
</div>
