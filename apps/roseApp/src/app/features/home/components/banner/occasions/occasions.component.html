<section class="w-full px-4 md:px-8 lg:px-[81px] mt-[25px]">

<div class="grid grid-cols-1  md:grid-cols-2 lg:grid-cols-3 gap-[24px] justify-items-center">
    @for(card of occasionsCards ;track card.title){
        <div class="relative  rounded-[16px] w-full  min-h-[271px] overflow-hidden flex flex-col "
        >
            <img [src]="card.image |assetUrl" [alt]="card.title | translate"
            class="absolute inset-0 w-full h-full object-cover  "/>

            <div class="absolute inset-0 bg-linear-to-b from-transparent to-black/50"></div>

            
        <div class=" mt-auto  relative z-10 p-[24px] flex flex-col gap-[10px]">
             <app-badge [text]="card.badge | translate"
            variant="secondary"   >

            </app-badge>
            <h3 class="font-sarabun font-semibold  text-[18px] sm:text-[20px] xl:text-[24px]  leading-none tracking-normal text-white"
            >{{ card.title | translate }}</h3>

        </div>

        </div>

    }

</div>
</section>
