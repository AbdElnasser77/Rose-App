<section class="about-section">
  <div class="about-container">
    <div class="about-grid">
      <!-- Images -->
      <div class="about-images">
        <div class="images-layout">
          <div class="main-image-frame">
            <img
              [src]="images.main"
              [alt]="'ABOUT_US.IMAGES.MAIN_ALT' | translate"
              class="main-image"
            />
          </div>

          <div class="small-images">
            <img
              [src]="images.giftBox"
              [alt]="'ABOUT_US.IMAGES.GIFT_ALT' | translate"
              class="gift-image"
            />

            <img
              [src]="images.balloons"
              [alt]="'ABOUT_US.IMAGES.BALLOONS_ALT' | translate"
              class="balloons-image"
            />
          </div>
        </div>
      </div>

      <!-- Content -->
      <div class="about-content">
        <p class="about-label">
          {{ 'ABOUT_US.LABEL' | translate }}
        </p>

        <h2 class="about-title">
  {{ 'ABOUT_US.TITLE_1' | translate }}
  <span>{{ 'ABOUT_US.TITLE_RED_1' | translate }}</span>
  {{ 'ABOUT_US.TITLE_2' | translate }}
  <br />
  <span>{{ 'ABOUT_US.TITLE_RED_2' | translate }}</span>
  {{ 'ABOUT_US.TITLE_3' | translate }}
</h2>

        <p class="about-description">
          {{ 'ABOUT_US.DESCRIPTION' | translate }}
        </p>

        <button type="button" class="about-btn">
          {{ 'ABOUT_US.BUTTON' | translate }}
          <span>→</span>
        </button>

        <div class="about-features">
          <div *ngFor="let feature of features" class="feature-item">
            <span class="check">✓</span>
            <span>{{ feature | translate }}</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
