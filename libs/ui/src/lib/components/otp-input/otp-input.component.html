<div class="flex gap-2">
    
  @for (box of otpBoxes; track $index;let i = $index) {
    <input
      type="text"
      maxlength="1"
      class="w-[45px] h-[45px] border  rounded-md text-center hover:border-[#A1A1AA]
       focus:border-[#A6252A] focus:outline-none transition-all duration-150"
      [value]="otpBoxes[i]"
      (input)="onInput($event, i)"
      (keydown)="onKeyDown($event, i)"
      (blur)="onBlur()"
      [disabled]="isDisabled()"
      [ngClass]="getClass(i)"
    />
  }
</div>
